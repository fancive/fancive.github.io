<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Raw Sources layer -->
  <rect x="80" y="80" width="300" height="180" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="130" y="120" fill="#94a3b8" font-family="sans-serif" font-size="14" font-weight="bold">RAW SOURCES</text>
  <text x="100" y="155" fill="#64748b" font-family="monospace" font-size="13">📄 Huberman-dopamine.md</text>
  <text x="100" y="180" fill="#64748b" font-family="monospace" font-size="13">📄 sleep-research-2026.md</text>
  <text x="100" y="205" fill="#64748b" font-family="monospace" font-size="13">📄 FIRE-planning.md</text>
  <text x="100" y="230" fill="#64748b" font-family="monospace" font-size="13">📄 ...</text>

  <!-- Arrow -->
  <path d="M380 170 L440 170" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="390" y="155" fill="#38bdf8" font-family="sans-serif" font-size="12">AI 消化</text>

  <!-- Wiki layer -->
  <rect x="440" y="40" width="340" height="260" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="500" y="80" fill="#38bdf8" font-family="sans-serif" font-size="14" font-weight="bold">PERSONAL WIKI</text>

  <!-- Wiki nodes -->
  <rect x="470" y="100" width="130" height="36" rx="8" fill="#0f3460"/>
  <text x="485" y="124" fill="#e2e8f0" font-family="sans-serif" font-size="13">多巴胺系统</text>

  <rect x="620" y="100" width="130" height="36" rx="8" fill="#0f3460"/>
  <text x="650" y="124" fill="#e2e8f0" font-family="sans-serif" font-size="13">习惯优化</text>

  <rect x="470" y="160" width="130" height="36" rx="8" fill="#0f3460"/>
  <text x="490" y="184" fill="#e2e8f0" font-family="sans-serif" font-size="13">睡眠科学</text>

  <rect x="620" y="160" width="130" height="36" rx="8" fill="#0f3460"/>
  <text x="640" y="184" fill="#e2e8f0" font-family="sans-serif" font-size="13">精力管理</text>

  <rect x="540" y="220" width="130" height="36" rx="8" fill="#0f3460"/>
  <text x="570" y="244" fill="#e2e8f0" font-family="sans-serif" font-size="13">动机理论</text>

  <!-- Cross links -->
  <line x1="600" y1="118" x2="620" y2="118" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="535" y1="136" x2="535" y2="160" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="685" y1="136" x2="685" y2="160" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="600" y1="178" x2="620" y2="178" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="535" y1="196" x2="570" y2="220" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="685" y1="196" x2="650" y2="220" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Schema layer -->
  <rect x="820" y="80" width="300" height="180" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="870" y="120" fill="#a78bfa" font-family="sans-serif" font-size="14" font-weight="bold">CLAUDE.md (SCHEMA)</text>
  <text x="840" y="155" fill="#94a3b8" font-family="monospace" font-size="12">domains: 技术/心理/方法论...</text>
  <text x="840" y="178" fill="#94a3b8" font-family="monospace" font-size="12">types: concept/synthesis</text>
  <text x="840" y="201" fill="#94a3b8" font-family="monospace" font-size="12">ops: ingest/query/lint</text>
  <text x="840" y="224" fill="#94a3b8" font-family="monospace" font-size="12">rule: never modify sources</text>

  <!-- Bottom: 5 operations -->
  <rect x="80" y="360" width="1040" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <rect x="110" y="390" width="170" height="80" rx="8" fill="#164e63"/>
  <text x="145" y="425" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">1. Ingest</text>
  <text x="130" y="450" fill="#94a3b8" font-family="sans-serif" font-size="12">素材 → 词条网络</text>

  <rect x="300" y="390" width="170" height="80" rx="8" fill="#164e63"/>
  <text x="320" y="425" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">2. Query</text>
  <text x="315" y="450" fill="#94a3b8" font-family="sans-serif" font-size="12">提问 → 回答 → 回写</text>

  <rect x="490" y="390" width="170" height="80" rx="8" fill="#164e63"/>
  <text x="540" y="425" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">3. Lint</text>
  <text x="510" y="450" fill="#94a3b8" font-family="sans-serif" font-size="12">矛盾/过时/缺页</text>

  <rect x="680" y="390" width="170" height="80" rx="8" fill="#164e63"/>
  <text x="705" y="425" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">4. Link</text>
  <text x="700" y="450" fill="#94a3b8" font-family="sans-serif" font-size="12">跨域交叉引用</text>

  <rect x="870" y="390" width="170" height="80" rx="8" fill="#164e63"/>
  <text x="885" y="425" fill="#22d3ee" font-family="sans-serif" font-size="16" font-weight="bold">5. Compile</text>
  <text x="890" y="450" fill="#94a3b8" font-family="sans-serif" font-size="12">合并/拆分/重组</text>

  <!-- Tagline -->
  <text x="280" y="530" fill="#e2e8f0" font-family="sans-serif" font-size="28" font-weight="bold">AI 是园丁，花园的主人是你</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
